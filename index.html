<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muhammad Nawaz | Front-end Developer</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var cls = t === "light" || t === "dark" ? "theme-" + t : window.matchMedia("(prefers-color-scheme: dark)").matches ? "theme-dark" : "theme-light";
          document.documentElement.classList.add(cls);
          document.documentElement.setAttribute("data-bs-theme", cls === "theme-dark" ? "dark" : "light");
        } catch (e) {
          document.documentElement.classList.add("theme-light");
          document.documentElement.setAttribute("data-bs-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
