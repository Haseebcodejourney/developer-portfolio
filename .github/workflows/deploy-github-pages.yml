# Publishes the Vite `dist/` folder using GitHub’s official Pages Actions (OIDC).
#
# REQUIRED repo settings (one-time):
# 1) Settings → Actions → General → Workflow permissions
#    → choose "Read and write permissions" (needed if you ever use branch-push deploy tools)
# 2) Settings → Pages → Build and deployment → Source
#    → choose "GitHub Actions" (NOT "Deploy from a branch" while using this workflow)
# 3) First run: if Actions asks to "Review deployments" for environment `github-pages`, approve it
#
name: Deploy to GitHub Pages

on:
  # Manual only — use Netlify workflow for normal deploys (see deploy-netlify.yml).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Verify build output
        run: |
          ls -la dist
          test -f dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
